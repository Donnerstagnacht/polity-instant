[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 17

[db.pooler]
enabled = false

[db.settings]
max_connections = 200


[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.email.template.confirmation]
subject = "Confirm your signup for Polity"
content_path = "./email-templates/confirm-signup.html"

[auth.email.template.invite]
subject = "You have been invited to Polity"
content_path = "./email-templates/invite.html"

[auth.email.template.magic_link]
subject = "Your Magic Link for Polity"
content_path = "./email-templates/magic-link.html"

[auth.email.template.email_change]
subject = "Confirm your email change for Polity"
content_path = "./email-templates/confirm-email-change.html"

[auth.email.template.recovery]
subject = "Reset your password for Polity"
content_path = "./email-templates/reset-password.html"

[auth.email.template.reauthentication]
subject = "Confirm reauthentication for Polity"
content_path = "./email-templates/reauthentication.html"

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.avatars]
public = true
file_size_limit = "5MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/gif", "image/webp", "image/svg+xml"]

[storage.buckets.uploads]
public = true
file_size_limit = "50MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/gif", "image/webp", "image/svg+xml", "video/mp4", "video/webm", "video/quicktime", "application/pdf"]

[analytics]
enabled = true
port = 54327
vector_port = 54328
backend = "postgres"
