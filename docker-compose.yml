# Requires: `npx supabase start` must be running first.
# This compose file only runs zero-cache and the app,
# connecting to the Supabase-managed Postgres via the Supabase Docker network.

services:
  # ── Zero Cache Server ──────────────────────────────────────────────
  zero-cache:
    image: node:22-alpine
    working_dir: /app
    environment:
      ZERO_UPSTREAM_DB: postgres://postgres:postgres@supabase_db_polity:5432/postgres
      ZERO_CVR_DB: postgres://postgres:postgres@supabase_db_polity:5432/postgres
      ZERO_CHANGE_DB: postgres://postgres:postgres@supabase_db_polity:5432/postgres
      ZERO_REPLICA_FILE: /tmp/zero.db
      ZERO_QUERY_URL: http://app:3000/api/zero/query
      ZERO_MUTATE_URL: http://app:3000/api/zero/mutate
      ZERO_QUERY_FORWARD_COOKIES: "true"
      ZERO_MUTATE_FORWARD_COOKIES: "true"
    ports:
      - "4848:4848"
    volumes:
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    command: >
      sh -c "apk add --no-cache python3 make g++ && npm ci --legacy-peer-deps && npx zero-cache-dev"
    networks:
      - supabase_network_polity
      - default
    restart: unless-stopped

  # ── Polity App ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      zero-cache:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@supabase_db_polity:5432/postgres
      SUPABASE_URL: http://supabase_kong_polity:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      VITE_ZERO_CACHE_URL: http://localhost:4848
      VITE_APP_URL: http://localhost:3000
      VITE_PRESENCE_WS_URL: ""
    ports:
      - "3000:3000"
    networks:
      - supabase_network_polity
      - default
    restart: unless-stopped

networks:
  supabase_network_polity:
    external: true
